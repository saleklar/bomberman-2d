name: Build Bomberman Executable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller
    
    - name: Build EXE
      working-directory: .
      run: |
        pyinstaller --onefile --windowed --name "Bomberman" --add-data "bomberman_2d/assets;assets" "bomberman_2d/main.py"
        dir dist
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bomberman-exe
        path: dist/Bomberman.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
