name: Build Bomberman Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Bomberman.exe
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller
    
    - name: List files before build
      run: |
        dir bomberman_2d
        dir bomberman_2d\assets
    
    - name: Build executable with PyInstaller
      run: |
        echo "Building Bomberman.exe..."
        pyinstaller --onefile --windowed --name "Bomberman" --add-data "bomberman_2d/assets;assets" "bomberman_2d/main.py"
        echo "Build complete, checking dist folder..."
        dir dist
        if not exist "dist\Bomberman.exe" (
          echo ERROR: Bomberman.exe was not created!
          exit /b 1
        )
        echo Build successful!
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: Bomberman-Windows
        path: dist/Bomberman.exe
        if-no-files-found: error
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/Bomberman.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
