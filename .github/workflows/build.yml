name: Build Bomberman Executable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Bomberman.exe
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        echo "Building Bomberman.exe..."
        pyinstaller --onefile --windowed --name "Bomberman" --add-data "bomberman_2d/assets;assets" "bomberman_2d/main.py"
        echo "Build complete, checking dist folder..."
        dir dist
        if not exist "dist\Bomberman.exe" (
          echo ERROR: Bomberman.exe was not created!
          exit /b 1
        )
        echo Build successful!
        powershell -Command "Get-Item dist/Bomberman.exe | Select-Object FullName, Length"
    
    - name: Upload to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Bomberman-Windows
        path: dist/Bomberman.exe
        if-no-files-found: error
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
        gh release create $tag dist/Bomberman.exe --title "Bomberman $tag" --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
